<div class="project-detail-page" *ngIf="project() as p">
  <!-- Breadcrumb + header -->
  <div class="page-header">
    <div class="breadcrumb">
      <a routerLink="/projects" class="breadcrumb-link">
        <mat-icon>folder</mat-icon> Projects
      </a>
      <mat-icon class="sep">chevron_right</mat-icon>
      <span>{{ p.title }}</span>
    </div>

    <div class="header-actions">
      <button mat-stroked-button (click)="showInvite.set(!showInvite())">
        <mat-icon>person_add</mat-icon> Invite Member
      </button>
    </div>
  </div>

  <!-- Invite form (inline) -->
  <div class="invite-panel" *ngIf="showInvite()">
    <form [formGroup]="inviteForm" (ngSubmit)="inviteMember()" class="invite-form">
      <mat-form-field appearance="outline">
        <mat-label>Member email</mat-label>
        <input matInput formControlName="email" placeholder="colleague@company.com" type="email">
        <mat-icon matSuffix>email</mat-icon>
      </mat-form-field>
      <button mat-flat-button color="primary" type="submit" [disabled]="inviteForm.invalid || inviting()">
        {{ inviting() ? 'Inviting...' : 'Send Invite' }}
      </button>
      <button mat-button type="button" (click)="showInvite.set(false)">Cancel</button>
    </form>
  </div>

  <!-- Stats strip -->
  <div class="project-stats">
    <div class="stat-pill">
      <mat-icon>group</mat-icon>
      <span>{{ p.memberCount }} Members</span>
    </div>
    <div class="stat-pill">
      <mat-icon>checklist</mat-icon>
      <span>{{ p.taskCount }} Tasks</span>
    </div>
    <div class="stat-pill">
      <mat-icon>person</mat-icon>
      <span>Created by {{ p.creatorName }}</span>
    </div>
    <div class="stat-pill">
      <mat-icon>calendar_today</mat-icon>
      <span>{{ p.createdAt | date:'mediumDate' }}</span>
    </div>
  </div>

  <!-- Tabs: Kanban + Settings -->
  <mat-tab-group animationDuration="200ms" class="project-tabs">
    <mat-tab label="Kanban Board">
      <ng-template matTabContent>
        <div class="tab-content">
          <app-kanban-board [projectId]="p.id"></app-kanban-board>
        </div>
      </ng-template>
    </mat-tab>

    <mat-tab label="About">
      <ng-template matTabContent>
        <div class="tab-content about-tab">
          <mat-card>
            <mat-card-content>
              <h3>Description</h3>
              <p>{{ p.description || 'No description provided.' }}</p>
            </mat-card-content>
          </mat-card>
        </div>
      </ng-template>
    </mat-tab>
  </mat-tab-group>
</div>

<!-- Loading -->
<div *ngIf="loading()" class="detail-loading">
  <div class="skeleton-header"></div>
  <div class="skeleton-tabs"></div>
  <div class="skeleton-body"></div>
</div>
