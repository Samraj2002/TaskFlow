<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">
        <mat-icon class="logo-icon">task_alt</mat-icon>
        <span>TaskFlow</span>
      </div>
      <h1>Create your account</h1>
      <p>Start managing tasks with your team</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Full Name</mat-label>
        <input matInput formControlName="name" placeholder="John Smith" autocomplete="name">
        <mat-icon matPrefix>person</mat-icon>
        <mat-error *ngIf="form.get('name')?.hasError('required')">Name is required</mat-error>
        <mat-error *ngIf="form.get('name')?.hasError('minlength')">Minimum 2 characters</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" placeholder="you@company.com" autocomplete="email">
        <mat-icon matPrefix>email</mat-icon>
        <mat-error *ngIf="form.get('email')?.hasError('required')">Email is required</mat-error>
        <mat-error *ngIf="form.get('email')?.hasError('email')">Enter a valid email</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" autocomplete="new-password">
        <mat-icon matPrefix>lock</mat-icon>
        <mat-error *ngIf="form.get('password')?.hasError('required')">Password is required</mat-error>
        <mat-error *ngIf="form.get('password')?.hasError('minlength')">Minimum 6 characters</mat-error>
      </mat-form-field>

      <div class="error-banner" *ngIf="error()">
        <mat-icon>error_outline</mat-icon> {{ error() }}
      </div>

      <button mat-flat-button color="primary" type="submit"
              [disabled]="form.invalid || loading()" class="submit-btn">
        <mat-spinner *ngIf="loading()" diameter="20"></mat-spinner>
        <span *ngIf="!loading()">Create Account</span>
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a routerLink="/auth/login">Sign in</a>
    </div>
  </div>
</div>
